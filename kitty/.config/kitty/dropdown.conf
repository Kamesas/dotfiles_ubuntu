include kitty.conf

linux_display_server x11

font_family      FiraCode Nerd Font Med
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

cursor_shape     block
cursor_blink_interval 0.8

enable_audio_bell no

background_opacity 0.95

hide_window_decorations yes
window_padding_width 0

# Tango colors — matches WezTerm dropdown
foreground #d3d7cf
background #000000
cursor     #ffffff

color0  #000000
color1  #cc0000
color2  #4e9a06
color3  #c4a000
color4  #3465a4
color5  #75507b
color6  #06989a
color7  #d3d7cf
color8  #555753
color9  #ef2929
color10 #8ae234
color11 #fce94f
color12 #729fcf
color13 #ad7fa8
color14 #34e2e2
color15 #eeeeec

selection_foreground #000000
selection_background #b5d5ff

shell tmux new-session -As kitty-dropdown
