# Force Ctrl+. and Ctrl+, to send CSI-u sequences that Neovim understands
# as <C-.> and <C-,>. Standard terminals don't send these for Ctrl+punctuation.
map ctrl+period send_text all \x1b[46;5u
map ctrl+comma  send_text all \x1b[44;5u

tab_bar_min_tabs 2

# Kitty's own zoom defaults only bind Ctrl+Shift+=/Ctrl+Shift+- (kitty_mod).
# Ctrl++ happened to work anyway since "+" needs Shift on most keyboards, but
# plain Ctrl+- never matched anything. These add the plain-Ctrl forms, with
# the same 0.5pt step used in WezTerm for a consistent zoom feel.
map ctrl+equal  change_font_size all +0.5
map ctrl+plus   change_font_size all +0.5
map ctrl+minus  change_font_size all -0.5
map ctrl+0      change_font_size all 0
